<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .silver-inset {
            background: linear-gradient(145deg, rgba(236, 238, 241, 0.4), rgba(255, 255, 255, 0.2));
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), inset 0 -1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .destructive-label {
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .hairline-border {
            border: 0.5px solid rgba(0, 0, 0, 0.1);
        }
        .luminous-glow {
            box-shadow: 0 0 40px -10px rgba(70, 72, 212, 0.15);
        }
        @keyframes shimmer {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
        .shimmer-effect {
            animation: shimmer 4s infinite ease-in-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#7c8498",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#0d1c2d",
                        "on-secondary-fixed": "#07006c",
                        "on-secondary": "#ffffff",
                        "secondary": "#4648d4",
                        "surface-dim": "#d8dadd",
                        "on-primary-fixed-variant": "#3f4759",
                        "surface-bright": "#f7f9fc",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#45474c",
                        "surface-tint": "#565e71",
                        "tertiary-fixed-dim": "#b9c8de",
                        "secondary-container": "#6063ee",
                        "secondary-fixed": "#e1e0ff",
                        "inverse-surface": "#2d3133",
                        "surface": "#f7f9fc",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#dbe2f9",
                        "tertiary-fixed": "#d4e4fa",
                        "on-primary-fixed": "#141b2c",
                        "surface-container-low": "#f2f4f7",
                        "surface-container-highest": "#e0e3e6",
                        "primary-container": "#141b2c",
                        "surface-container": "#eceef1",
                        "on-tertiary-container": "#768599",
                        "tertiary": "#000000",
                        "background": "#f7f9fc",
                        "on-error": "#ffffff",
                        "on-background": "#191c1e",
                        "on-secondary-container": "#fffbff",
                        "primary": "#000000",
                        "outline": "#76777d",
                        "inverse-on-surface": "#eff1f4",
                        "primary-fixed-dim": "#bfc6dc",
                        "surface-container-high": "#e6e8eb",
                        "surface-variant": "#e0e3e6",
                        "on-surface": "#191c1e",
                        "on-tertiary-fixed-variant": "#39485a",
                        "outline-variant": "#c6c6cd",
                        "on-tertiary-fixed": "#0d1c2d",
                        "inverse-primary": "#bfc6dc",
                        "on-secondary-fixed-variant": "#2f2ebe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-padding": "64px",
                        "unit": "4px",
                        "element-gap": "16px",
                        "gutter": "24px",
                        "container-margin": "40px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"]
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-surface-bright flex items-center justify-center min-h-screen overflow-hidden">
<!-- Background Atmospheric Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-[#e5e7eb] opacity-40"></div>

<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[150px]"></div>
</div>
<!-- Modal Container -->
<div class="relative z-10 w-full max-w-[440px] px-container-margin">
<div class="glass-panel luminous-glow bg-white/70 rounded-xl overflow-hidden shadow-[0_60px_60px_rgba(0,0,0,0.08)]">
<!-- Header Area (Darker Charcoal Glass) -->
<header class="bg-primary/90 backdrop-blur-xl px-6 py-5 flex flex-col gap-1 border-b border-white/10">
<span class="destructive-label font-label-sm text-label-sm text-secondary-fixed-dim/80 tracking-widest">
                    Destructive Action
                </span>
<h1 class="font-headline-md text-headline-md text-white tracking-tight">
                    Delete application?
                </h1>
</header>
<!-- Body Area -->
<div class="p-6 flex flex-col gap-element-gap">
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    This action is permanent and cannot be undone. All data associated with this executive flow will be purged from the secure environment.
                </p>
<!-- Silver-Etched Inset Card -->
<div class="silver-inset p-4 rounded-lg flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-white/80 hairline-border flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">
                            description
                        </span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-primary/40 uppercase tracking-wider">Reference ID</span>
<span class="font-headline-md text-[18px] text-primary font-bold">ApplyFlow_HQ_2024</span>
</div>
</div>
<!-- Action Footer -->
<div class="flex items-center justify-end gap-gutter mt-2">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all duration-300 px-4 py-2 cursor-pointer">
                        Cancel
                    </button>
<button class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-error/20 to-secondary/20 rounded-lg blur opacity-0 group-hover:opacity-100 transition duration-500"></div>
<div class="relative px-8 py-3 bg-primary text-white font-label-md text-label-md rounded-lg flex items-center gap-2 hover:bg-black/90 transition-all duration-300 shadow-xl border-t border-white/10">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">delete</span>
                            Delete
                        </div>
</button>
</div>
</div>
<!-- Decorative Hairline Highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/40 to-transparent shimmer-effect"></div>
</div>
<!-- Subtle "Click outside" prompt -->
<div class="mt-8 text-center">
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-40 uppercase tracking-[0.2em]">Press ESC to dismiss</span>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.querySelector('.glass-panel');
                modal.style.transform = 'scale(0.98) translateY(10px)';
                modal.style.opacity = '0';
                modal.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            }
        });

        // Soft entry animation
        window.addEventListener('DOMContentLoaded', () => {
            const modal = document.querySelector('.glass-panel');
            modal.style.opacity = '0';
            modal.style.transform = 'translateY(20px) scale(0.95)';
            
            setTimeout(() => {
                modal.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                modal.style.opacity = '1';
                modal.style.transform = 'translateY(0) scale(1)';
            }, 100);
        });
    </script>
</body></html>
